<!DOCTYPE html>
<html>
<head>
    <title>Calculate</title>
</head>
<body>
    <h1>Calculate Sum</h1>

    <label for="num1">Enter Number 1:</label><br>
    <input type="text" id="num1" placeholder="Number 1">
    <br><br>

    <label for="num2">Enter Number 2:</label><br>
    <input type="text" id="num2" placeholder="Number 2">
    <br><br>

    <button onclick="calculateSum()">Calculate Sum</button>
    <p id="sumresult"></p>

    <h1>Calculate Product</h1>

    <label for="num3">Enter Number 3:</label><br>
    <input type="text" id="num3" placeholder="Number 3">
    <br><br>

    <label for="num4">Enter Number 4:</label><br>
    <input type="text" id="num4" placeholder="Number 4">
    <br><br>

    <button onclick="calculateProduct()">Calculate Product</button>
    <p id="productresult"></p>

    <script>
        function calculateSum() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);

            if (isNaN(num1) || isNaN(num2)) {
                document.getElementById("result").innerHTML = "Please enter valid numbers.";
                return;
            }

            let sum = num1 + num2;
            document.getElementById("sumresult").innerHTML = "Sum: " + sum;
        }

        function calculateProduct() {
            let num1 = parseFloat(document.getElementById("num3").value);
            let num2 = parseFloat(document.getElementById("num4").value);

            if (isNaN(num1) || isNaN(num2)) {
                document.getElementById("result").innerHTML = "Please enter valid numbers.";
                return;
            }

            let product = num1 * num2;
            document.getElementById("productresult").innerHTML = "Product: " + product;
        }

    </script>
</body>
</html>
